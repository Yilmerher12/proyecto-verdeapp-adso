services:
  verde_db:
    image: postgres:17-alpine
    container_name: verde_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: verde_user
      POSTGRES_PASSWORD: verde_password
      POSTGRES_DB: verdeapp_db
    ports:
      - "5432:5432"
    volumes:
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verde_user -d verdeapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - verde_network

  verde_be:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: verde_be
    restart: unless-stopped
    env_file:
      - ./be/.env # 🛡️ Lee las variables de forma segura y oculta
    ports:
      - "8000:8000"
    depends_on:
      verde_db:
        condition: service_healthy
    networks:
      - verde_network

  verde_fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: verde_fe
    restart: unless-stopped
    env_file:
      - ./fe/.env # 🛡️ Lee las variables de forma segura y oculta
    ports:
      - "3000:80"
    depends_on:
      - verde_be
    networks:
      - verde_network

  verde_mailpit:
    image: axllent/mailpit:latest
    container_name: verde_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - verde_network

networks:
  verde_network:
    driver: bridge

volumes:
  db_data:  